name: oneness-ai

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oneness
      POSTGRES_PASSWORD: oneness
      POSTGRES_DB: oneness
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oneness -d oneness"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: oneness
      MINIO_ROOT_PASSWORD: oneness-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 oneness oneness-secret &&
        mc mb --ignore-existing local/user-uploads local/task-outputs &&
        echo 'buckets ready' &&
        exit 0
      "

volumes:
  pg_data:
  minio_data:
